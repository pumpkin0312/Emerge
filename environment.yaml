name: emerge

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - numpy>=1.24.0
  - scipy>=1.11.0
  - scikit-learn>=1.3.0
  - matplotlib>=3.7.0
  - pyyaml>=6.0
  - tqdm>=4.66.0

  - pip:
    # PyTorch with CUDA 12.1 (RTX 4060 / 服务器均适用)
    - torch>=2.2.0 --index-url https://download.pytorch.org/whl/cu121
    - torchvision --index-url https://download.pytorch.org/whl/cu121
    - umap-learn>=0.5.3
    - wandb>=0.16.0
